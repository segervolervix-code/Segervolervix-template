

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interface - Hardened Build</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .terminal { width: 600px; background: #1e1e1e; border: 1px solid #333; border-radius: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; }
        .output { height: 180px; overflow-y: auto; padding: 15px; font-size: 14px; line-height: 1.5; border-bottom: 1px solid #333; font-family: monospace; }
        .input-area { display: flex; padding: 10px; background: #252525; gap: 10px; }
        input { flex: 1; background: #121212; border: 1px solid #444; color: #00ff00; padding: 8px; outline: none; }
        button { background: #444; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 3px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .view-area { width: 600px; height: 400px; border: 1px solid #333; border-radius: 5px; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #display-img { max-width: 100%; max-height: 100%; display: none; object-fit: contain; }
        .msg-line { margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="terminal">
    <div id="output" class="output">System Secure. Trust boundary enforced.</div>
    <div class="input-area">
        <input type="text" id="prompt" placeholder="Enter command..." onkeypress="if(event.key==='Enter') sendChat()">
        <button id="chat-btn" onclick="sendChat()">Chat</button>
        <button id="img-btn" onclick="generateImage()" style="background: #2e86de;">Imagine</button>
    </div>
</div>

<div class="view-area">
    <img id="display-img" alt="Generated Content">
</div>

<script>
   console.log("Never paste anything in console as it could compromise your account")
  const CHAT_URL = "https://segervolervix.space/api/chat";
    const IMAGE_URL = "https://segervolervix.space/api/imagine";
    const API_KEY = "YOUR_API_KEY";

    const out = document.getElementById('output');
    const displayImg = document.getElementById('display-img');
    const inputField = document.getElementById('prompt');
    
    let isBusy = false;
    let currentObjectUrl = null;

    function setUIState(busy) {
        isBusy = busy;
        inputField.disabled = busy;
        document.getElementById('chat-btn').disabled = busy;
        document.getElementById('img-btn').disabled = busy;
    }

    function appendMessage(text, color) {
        const div = document.createElement('div');
        div.className = 'msg-line';
        div.style.color = color;
        div.textContent = text;
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
    }

    async function sendChat() {
        if (isBusy) return;
        const val = inputField.value.trim();
        if(!val) return;

        setUIState(true);
        appendMessage(`> ${val}`, "#5dade2");
        inputField.value = '';

        try {
            const res = await fetch(CHAT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({ message: val })
            });
            const data = await res.json();
            if(data.reply) appendMessage(`# ${data.reply}`, "#58d68d");
            else appendMessage("Error", "#ec7063");
        } catch (e) {
            appendMessage("Error", "#ec7063");
        } finally {
            setUIState(false);
            inputField.focus();
        }
    }

    async function generateImage() {
        if (isBusy) return;
        const val = inputField.value.trim();
        if(!val) return;

        setUIState(true);
        appendMessage("* Generating and verifying image...", "#f1c40f");
        inputField.value = '';

        try {
            // Step 1: Get the link from API
            const res = await fetch(IMAGE_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({ prompt: val })
            });
            const data = await res.json();
            
            if(data.link) {
                // Step 2: Fetch the actual image data to avoid iframe/navigation risks
                const imageRes = await fetch(data.link);
                const imageBlob = await imageRes.blob();
                
                // Clean up old URL to prevent memory leaks
                if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
                
                currentObjectUrl = URL.createObjectURL(imageBlob);
                displayImg.src = currentObjectUrl;
                displayImg.style.display = 'block';
                
                appendMessage("# Image verified and loaded.", "#58d68d");
            } else {
                appendMessage("Error", "#ec7063");
            }
        } catch (e) {
            appendMessage("Error", "#ec7063");
        } finally {
            setUIState(false);
            inputField.focus();
        }
    }
</script>

</body>
</html>
