<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Console</title>

<style>
    :root {
        --bg: #05060a;
        --panel: #0d0f16;
        --accent: #00f7ff;
        --accent2: #8b5cf6;
        --error: #ff4d6d;
        --warn: #ffd166;
        --border: #1a1d29;
        --glow: 0 0 12px rgba(0, 247, 255, 0.4);
        --font: "JetBrains Mono", monospace;
    }

    body {
        margin: 0;
        background: radial-gradient(circle at top, #0a0c14, #05060a 70%);
        color: #e0e0e0;
        font-family: var(--font);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 40px;
        letter-spacing: 0.4px;
    }

    .terminal {
        width: 700px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        box-shadow: 0 0 25px rgba(0, 247, 255, 0.08), inset 0 0 20px rgba(255,255,255,0.03);
        overflow: hidden;
        margin-bottom: 30px;
        backdrop-filter: blur(6px);
    }

    .output {
        height: 240px;
        overflow-y: auto;
        padding: 20px;
        font-size: 14px;
        line-height: 1.6;
        border-bottom: 1px solid var(--border);
        white-space: pre-wrap;
        text-shadow: 0 0 4px rgba(0, 247, 255, 0.3);
    }

    .input-area {
        display: flex;
        padding: 14px;
        background: #0a0c14;
        gap: 12px;
        border-top: 1px solid #11131a;
    }

    input {
        flex: 1;
        background: #05060a;
        border: 1px solid var(--border);
        color: var(--accent);
        padding: 12px;
        font-family: var(--font);
        border-radius: 6px;
        box-shadow: inset 0 0 10px rgba(0, 247, 255, 0.1);
        transition: 0.2s;
    }

    input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 10px rgba(0, 247, 255, 0.4);
    }

    button {
        padding: 12px 18px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-family: var(--font);
        transition: 0.25s;
        font-weight: bold;
        letter-spacing: 0.5px;
    }

    #chat-btn {
        background: var(--accent2);
        color: #fff;
        box-shadow: 0 0 10px rgba(139, 92, 246, 0.4);
    }

    #chat-btn:hover {
        box-shadow: 0 0 18px rgba(139, 92, 246, 0.7);
    }

    #img-btn {
        background: var(--accent);
        color: #000;
        box-shadow: 0 0 10px rgba(0, 247, 255, 0.4);
    }

    #img-btn:hover {
        box-shadow: 0 0 18px rgba(0, 247, 255, 0.7);
    }

    button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        box-shadow: none;
    }

    .view-area {
        width: 700px;
        height: 450px;
        background: #000;
        border: 1px solid var(--border);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        box-shadow: inset 0 0 25px rgba(0, 247, 255, 0.08);
    }

    #display-img {
        max-width: 100%;
        max-height: 100%;
        display: none;
        border-radius: 6px;
    }

    .msg-line {
        margin-bottom: 6px;
        animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(3px); }
        to { opacity: 1; transform: translateY(0); }
    }

    footer {
        margin-top: 25px;
        opacity: 0.6;
        font-size: 14px;
        color: #9aa0b8;
        text-shadow: 0 0 6px rgba(0, 247, 255, 0.3);
    }
</style>
</head>

<body>

<div class="terminal">
    <div id="output" class="output">[SYSTEM] Console initialized. Secure boundary active.</div>

    <div class="input-area">
        <input id="prompt" placeholder="Type a command..." onkeypress="if(event.key==='Enter') sendChat()">
        <button id="chat-btn" onclick="sendChat()">Chat</button>
        <button id="img-btn" onclick="generateImage()">Imagine</button>
    </div>
</div>

<div class="view-area">
    <img id="display-img" alt="Generated Image">
</div>

<script>
console.log("⚠️ Never paste unknown code into the console.");

const CHAT_URL = "https://segervolervix.space/api/chat";
const IMAGE_URL = "https://segervolervix.space/api/imagine";
const API_KEY = "YOUR_API_KEY";

const out = document.getElementById('output');
const displayImg = document.getElementById('display-img');
const inputField = document.getElementById('prompt');

let isBusy = false;
let currentObjectUrl = null;

function setUIState(busy) {
    isBusy = busy;
    inputField.disabled = busy;
    document.getElementById('chat-btn').disabled = busy;
    document.getElementById('img-btn').disabled = busy;
}

function appendMessage(text, color) {
    const div = document.createElement('div');
    div.className = 'msg-line';
    div.style.color = color;
    div.textContent = text;
    out.appendChild(div);
    out.scrollTop = out.scrollHeight;
}

async function sendChat() {
    if (isBusy) return;
    const val = inputField.value.trim();
    if (!val) return;

    setUIState(true);
    appendMessage("> " + val, "#8b5cf6");
    inputField.value = "";

    try {
        const res = await fetch(CHAT_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${API_KEY}`
            },
            body: JSON.stringify({ message: val })
        });

        const data = await res.json();
        if (data.reply) appendMessage(data.reply, "#00f7ff");
        else appendMessage("[ERROR] Invalid response", "#ff4d6d");

    } catch (err) {
        appendMessage("[ERROR] Network failure", "#ff4d6d");
    }

    setUIState(false);
    inputField.focus();
}

async function generateImage() {
    if (isBusy) return;
    const val = inputField.value.trim();
    if (!val) return;

    setUIState(true);
    appendMessage("* Generating image...", "#ffd166");
    inputField.value = "";

    try {
        const res = await fetch(IMAGE_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${API_KEY}`
            },
            body: JSON.stringify({ prompt: val })
        });

        const data = await res.json();

        if (data.link) {
            const imgRes = await fetch(data.link);
            const blob = await imgRes.blob();

            if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);

            currentObjectUrl = URL.createObjectURL(blob);
            displayImg.src = currentObjectUrl;
            displayImg.style.display = "block";

            appendMessage("# Image loaded successfully", "#00f7ff");
        } else {
            appendMessage("[ERROR] No image link returned", "#ff4d6d");
        }

    } catch (err) {
        appendMessage("[ERROR] Image generation failed", "#ff4d6d");
    }

    setUIState(false);
    inputField.focus();
}
</script>

<footer>This is a demo of segervolervix, Guidelines apply</footer>
</body>
</html>
