<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NergeAI</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="stylesheet" href="/style.css">
  <meta name="description" content="If you need someone to talk to, or you want to code, This site is the perfect place, AI powered.">
<meta name="keywords" content="AI, coding, testing">

</head>
<body>

<div id="topbar">
  <div id="brand">
    <div id="logo">N</div>
    <div id="brand-name">Nerge<b>AI</b></div>
  </div>
  <div id="topbar-right">
    <select id="model-sel">
      <option value="nergeenolix">nergeenolix</option>
      <option value="llama-3.3-70b-instruct">llama-3.3-70b-instruct</option>
      <option value="nergeenolix_1.0">nergeenolix_1.0</option>
      <option value="llama-4-scout">llama-4-scout</option>
      <option value="llama-3-8b-instruct">llama-3-8b-instruct</option>
      <option value="nergeenolix_1.0beta">nergeenolix_1.0beta</option>
      <option value="nergeenolix_rp">nergeenolix_rp</option>
      <option value="lawyer_ai">lawyer_ai</option>
      <option value="web_searcher">web_searcher</option>
      <option value="nergeenolix_coder">nergeenolix_coder</option>
    </select>
    <button class="tbtn" id="clr-btn">Clear</button>
    <button class="tbtn" id="pp-btn">Privacy</button>
    <button class="tbtn" id="tos-btn">Terms</button>
  </div>
</div>

<div id="chat">
  <div id="empty">
    <div id="empty-logo">N</div>
    <div id="empty-title">NergeAI</div>
    <div id="empty-sub">Intelligent assistant powered by Segervolervix. Ask anything — I can search the web or generate images when needed.</div>
  </div>
</div>

<div id="bottom">
  <div id="input-row">
    <textarea id="msg-input" placeholder="Message NergeAI..." rows="1"></textarea>
    <button id="send">Send</button>
  </div>
</div>

<div id="overlay">
  <div id="modal">
    <button id="modal-x">&#x2715;</button>
    <div id="modal-t"></div>
    <div id="modal-b"></div>
  </div>
</div>

<script src="/script.js"></script>
</body>
</html>
